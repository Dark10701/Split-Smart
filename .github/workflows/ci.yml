name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from "packageManager" in package.json; specifying it
        # here too makes pnpm/action-setup@v4 fail on the mismatch.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @splitsmart/api prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  security-scan:
    name: Dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Best-effort dependency audit. npm's legacy audit endpoint (which `pnpm
      # audit` calls) has been retired (HTTP 410), so this is informational —
      # dependency CVEs are gated by the Trivy step below, which uses its own
      # vulnerability database rather than the npm registry.
      - name: Audit production dependencies (informational)
        run: pnpm audit --prod --audit-level high || true

      # Dependency vulnerabilities + committed secrets + misconfigurations via
      # Trivy's own DB (independent of the retired npm endpoint). Report-only
      # (exit-code 0) so it surfaces HIGH/CRITICAL findings in the job summary
      # without blocking on unfixable transitive advisories.
      - name: Trivy scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: '0'
          format: table
