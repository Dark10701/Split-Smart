name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Lint, typecheck, test, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        # Version comes from "packageManager" in package.json; specifying it
        # here too makes pnpm/action-setup@v4 fail on the mismatch.
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @splitsmart/api prisma:generate

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

  security-scan:
    name: Dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Blocking gate: any CRITICAL advisory in production dependencies fails CI.
      - name: Audit production dependencies (critical)
        run: pnpm audit --prod --audit-level critical

      # Informational: surface HIGH/moderate advisories (mostly transitive
      # framework deps) in the log for triage without blocking the pipeline.
      - name: Audit production dependencies (high, informational)
        run: pnpm audit --prod --audit-level high || true

      # Filesystem scan for committed secrets and misconfigurations. Report-only
      # so it never blocks on noise; findings surface in the job summary.
      - name: Trivy filesystem scan
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: fs
          scanners: secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: '0'
          format: table
